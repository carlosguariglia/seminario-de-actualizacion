<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>W3Admin Dashboard</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap">
  <link rel="stylesheet" href="./assets/icons/font-awesome-4.7.0/css/font-awesome.min.css">
  <link rel="stylesheet" href="./assets/css/w3pro-4.13.css">
  <link rel="stylesheet" href="./assets/css/w3-theme.css">
  <link rel="stylesheet" href="./assets/css/admin-styles.css">
  <link rel="stylesheet" href="./assets/css/scrollbar.css">
</head>

<body class="w3-light-grey">
  <wc-admin-layout></wc-admin-layout>
</body> 

<script>
// ========== FUNCIÓN FACTORY GENÉRICA ==========

function createElement(tag, props = {}) {
    const element = document.createElement(tag);
    
    for (const key in props) {
        if (key == 'textContent') {
            element.textContent = props[key];
        } else {
            element.setAttribute(key, props[key]);
        }
    }
    
    return element;
}

// ========== FUNCIONES EXTERNAS CREADORAS ==========

function crearTopbar() {
    const topbar = createElement('div', { 
        class: 'w3-top w3-card', 
        style: 'height:54px' 
    });
    
    const flexBar = createElement('div', { 
        class: 'w3-flex-bar w3-theme w3-left-align' 
    });
    
    // Logo
    const adminLogo = createElement('div', { 
        class: 'admin-logo w3-bar-item w3-hide-medium w3-hide-small' 
    });
    const h5 = createElement('h5', { 
        style: 'line-height:1; margin:0!important; font-weight:300' 
    });
    const logoLink = createElement('a', { 
        href: './index.html', 
        class: 'w3-button w3-bold' 
    });
    const logoImg = createElement('img', { 
        src: './assets/admin-logo.png', 
        alt: 'w3mix', 
        class: 'w3-image', 
        width: '26' 
    });
    logoLink.appendChild(logoImg);
    logoLink.appendChild(document.createTextNode(' \u00A0 W3Admin '));
    h5.appendChild(logoLink);
    adminLogo.appendChild(h5);
    
    // Botón hamburguesa
    const menuLabel = createElement('label', { 
        for: 'sidebar-control', 
        class: 'w3-button w3-large w3-opacity-min' 
    });
    const menuIcon = createElement('i', { class: 'fa fa-bars' });
    menuLabel.appendChild(menuIcon);
    
    // Div derecho vacío
    const rightDiv = createElement('div', { class: 'w3-right' });
    
    // Avatar usuario
    const textRightDiv = createElement('div', { class: 'text-right' });
    const userBtn = createElement('div', { class: 'w3-button' });
    const userCircle = createElement('div', { 
        class: 'w3-circle w3-center w3-text-white w3-primary', 
        style: 'width:38px; height:38px' 
    });
    const userIcon = createElement('i', { 
        class: 'fa fa-fw fa-user fa', 
        style: 'margin-top:11px' 
    });
    userCircle.appendChild(userIcon);
    userBtn.appendChild(userCircle);
    textRightDiv.appendChild(userBtn);
    
    // Ensamblar topbar
    flexBar.appendChild(adminLogo);
    flexBar.appendChild(menuLabel);
    flexBar.appendChild(rightDiv);
    flexBar.appendChild(textRightDiv);
    topbar.appendChild(flexBar);
    
    return topbar;
}

function crearSidebar() {
    const sidebar = createElement('nav', { 
        id: 'sidebar',
        class: 'w3-sidebar w3-top w3-bottom w3-collapse w3-white w3-border-right w3-border-top scrollbar',
        style: 'z-index:3;width:230px;height:auto;margin-top:54px;border-color:rgba(0, 0, 0, .1)!important'
    });
    
    // Header del sidebar (visible en mobile)
    const sidebarHeader = createElement('div', { 
        class: 'w3-bar-item w3-border-bottom w3-hide-large',
        style: 'padding:6px 0'
    });
    const closeLabel = createElement('label', { 
        for: 'sidebar-control',
        class: 'w3-left w3-button w3-large w3-opacity-min',
        style: 'background:white!important'
    });
    const closeIcon = createElement('i', { class: 'fa fa-bars' });
    closeLabel.appendChild(closeIcon);
    
    const sidebarH5 = createElement('h5', { 
        style: 'line-height:1; margin:0!important; font-weight:300'
    });
    const sidebarLogoLink = createElement('a', { 
        href: './index.html',
        class: 'w3-button',
        style: 'background:white!important'
    });
    const sidebarLogoImg = createElement('img', { 
        src: './assets/admin-logo.png',
        alt: 'w3mix',
        class: 'w3-image'
    });
    sidebarLogoLink.appendChild(sidebarLogoImg);
    sidebarLogoLink.appendChild(document.createTextNode(' \u00A0 W3Admin '));
    sidebarH5.appendChild(sidebarLogoLink);
    
    sidebarHeader.appendChild(closeLabel);
    sidebarHeader.appendChild(sidebarH5);
    
    // Menú de navegación
    const barBlock = createElement('div', { class: 'w3-bar-block' });
    
    const mainNavLabel = createElement('span', { 
        class: 'w3-bar-item w3-padding w3-small w3-opacity',
        style: 'margin-top:8px',
        textContent: ' MAIN NAVIGATION '
    });
    
    const dashboardLink = createElement('a', { 
        href: './index.html',
        class: 'w3-bar-item w3-button w3-padding-large w3-hover-text-primary'
    });
    const dashboardIcon = createElement('i', { class: 'fa fa-fw fa-bar-chart' });
    dashboardLink.appendChild(dashboardIcon);
    dashboardLink.appendChild(document.createTextNode('\u00A0 Dashboard '));
    
    const iconsLink = createElement('a', { 
        href: './icons.html',
        class: 'w3-bar-item w3-button w3-padding-large w3-hover-text-primary'
    });
    const iconsIcon = createElement('i', { class: 'fa fa-fw fa-fire' });
    iconsLink.appendChild(iconsIcon);
    iconsLink.appendChild(document.createTextNode('\u00A0 UI Icons '));
    
    const formsLink = createElement('a', { 
        href: './forms.html',
        class: 'w3-bar-item w3-button w3-padding-large w3-hover-text-primary'
    });
    const formsIcon = createElement('i', { class: 'fa fa-fw fa-edit' });
    formsLink.appendChild(formsIcon);
    formsLink.appendChild(document.createTextNode('\u00A0 Forms '));
    
    const labelsLabel = createElement('span', { 
        class: 'w3-bar-item w3-padding w3-small w3-opacity',
        textContent: ' LABELS '
    });
    
    const warningLink = createElement('a', { 
        href: '#dashboard',
        class: 'w3-bar-item w3-button w3-padding-large w3-hover-text-primary'
    });
    const warningIcon = createElement('i', { class: 'fa fa-fw fa-circle-o-notch w3-text-success' });
    warningLink.appendChild(warningIcon);
    warningLink.appendChild(document.createTextNode('\u00A0 Warning '));
    
    const infoLink = createElement('a', { 
        href: '#dashboard',
        class: 'w3-bar-item w3-button w3-padding-large w3-hover-text-primary'
    });
    const infoIcon = createElement('i', { class: 'fa fa-fw fa-share-alt w3-text-info' });
    infoLink.appendChild(infoIcon);
    infoLink.appendChild(document.createTextNode('\u00A0 Information '));
    
    // Ensamblar menú
    barBlock.appendChild(mainNavLabel);
    barBlock.appendChild(dashboardLink);
    barBlock.appendChild(iconsLink);
    barBlock.appendChild(formsLink);
    barBlock.appendChild(labelsLabel);
    barBlock.appendChild(warningLink);
    barBlock.appendChild(infoLink);
    
    // Ensamblar sidebar
    sidebar.appendChild(sidebarHeader);
    sidebar.appendChild(barBlock);
    
    return sidebar;
}

function crearMainContent() {
    const mainDiv = createElement('div', { 
        class: 'w3-main',
        style: 'margin-top:54px'
    });
    
    const paddingDiv = createElement('div', { 
        style: 'padding:16px 32px'
    });
    
    const footer = createElement('footer', { 
        class: 'w3-padding w3-border-top w3-center w3-white w3-margin-top'
    });
    const footerSpan = createElement('span', { 
        class: 'w3-opacity'
    });
    footerSpan.appendChild(document.createTextNode('Powered with '));
    const heartSpan = createElement('span', { 
        class: 'w3-text-red',
        textContent: '♥'
    });
    footerSpan.appendChild(heartSpan);
    footerSpan.appendChild(document.createTextNode(' by '));
    const footerLink = createElement('a', { 
        href: 'https://ISFT151.com',
        target: '_blank'
    });
    const footerStrong = createElement('strong', { 
        textContent: 'ISFT151.com'
    });
    footerLink.appendChild(footerStrong);
    footerSpan.appendChild(footerLink);
    footerSpan.appendChild(document.createTextNode('.'));
    footer.appendChild(footerSpan);
    
    mainDiv.appendChild(paddingDiv);
    mainDiv.appendChild(footer);
    
    return mainDiv;
}

// ========== WEB COMPONENT ==========

class WCAdminLayout extends HTMLElement {
    constructor() {
        super();

        // 1. Crear el checkbox de control del sidebar
        this.sidebarControl = createElement('input', {
            id: 'sidebar-control',
            type: 'checkbox',
            class: 'w3-hide'
        });

        // 2. Invocamos las 3 funciones externas
        this.topbar = crearTopbar();
        this.sidebar = crearSidebar();
        this.mainContent = crearMainContent();

        // 3. Crear estructura de contenedores
        const appDiv = createElement('div', { id: 'app' });
        appDiv.appendChild(this.topbar);
        appDiv.appendChild(this.sidebar);
        appDiv.appendChild(this.mainContent);

        // 4. Ensamblar en el webcomponent
        this.appendChild(this.sidebarControl);
        this.appendChild(appDiv);
    }
}

customElements.define('wc-admin-layout', WCAdminLayout);
</script>
</html>
