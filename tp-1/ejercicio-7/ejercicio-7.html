<!--- Ejercicio 6: hecho con IA para ver como maneja la visualizacion y armado de tablas

Consigna Ejercico 7:
Extienda el WebComponent desarrollado en el punto anterior, y agregue un botón que permita alternar 
la visualización de temperaturas de (ºC) a (ºF) y viceversa.
-->



<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Datos meteorológicos — Mar del Plata</title>
  
  <script>
    // ========== FUNCIÓN FACTORY GENÉRICA ==========
    
    function createElement(tag, props = {}) {
        const element = document.createElement(tag);
        
        for (const key in props) {
            if (key == 'textContent') {
                element.textContent = props[key];
            } else {
                element.setAttribute(key, props[key]);
            }
        }
        
        return element;
    }

    // ========== FUNCIONES EXTERNAS CREADORAS ==========

    function crearBotonToggle() {
        const btn = createElement('button', {
            type: 'button',
            class: 'toggle-btn',
            style: 'margin: 16px auto; display: block; padding: 8px 16px; cursor: pointer;'
        });
        return btn;
    }

    function crearContenedorTabla() {
        const container = createElement('div', {
            class: 'table-container',
            style: 'overflow: auto;'
        });
        return container;
    }

    // ========== FUNCIONES AUXILIARES ==========

    function celsiusAFahrenheit(c) {
        return (c * 9/5 + 32).toFixed(2);
    }

    function obtenerLabels(useFahrenheit) {
        const unit = useFahrenheit ? '°F' : '°C';
        return {
            temp_max_abs: `Temp. máx. abs (${unit})`,
            temp_max_avg: `Temp. máx. media (${unit})`,
            temp_avg: `Temp. media (${unit})`,
            temp_min_avg: `Temp. mín. media (${unit})`,
            precip_mm: 'Precip. total (mm)',
            sun_hours: 'Horas de sol',
            humidity: 'Humedad (%)'
        };
    }

    function esTemperatura(key) {
        return key.startsWith('temp_');
    }

    function average(values) {
        var nums = values.map(function(v) { return Number(v); }).filter(function(n) { return !Number.isNaN(n); });
        if (!nums.length) return '';
        return (nums.reduce(function(a, b) { return a + b; }, 0) / nums.length).toFixed(2);
    }

    function renderTable(container, data, useFahrenheit) {
        // Limpiar contenido previo
        container.textContent = '';

        var LABELS = obtenerLabels(useFahrenheit);
        var months = data.map(function(d) { return d.month; });
        var keys = Object.keys(data[0].values || {});

        var table = createElement('table', {
            class: 'weather-table',
            style: 'border-collapse: collapse; width: 100%; max-width: 900px; margin: 0 auto;'
        });

        // Cabecera
        var thead = createElement('thead');
        var headRow = createElement('tr');
        var thParam = createElement('th', {
            style: 'border: 1px solid #ddd; padding: 6px 8px; text-align: left; background: #f7f7f7; font-weight: 600;'
        });
        thParam.appendChild(document.createTextNode('Parámetro'));
        headRow.appendChild(thParam);
        
        for (var m = 0; m < months.length; m++) {
            var th = createElement('th', {
                style: 'border: 1px solid #ddd; padding: 6px 8px; text-align: right; background: #f7f7f7;'
            });
            th.appendChild(document.createTextNode(months[m]));
            headRow.appendChild(th);
        }
        
        var thAnual = createElement('th', {
            style: 'border: 1px solid #ddd; padding: 6px 8px; text-align: right; background: #f7f7f7;'
        });
        thAnual.appendChild(document.createTextNode('Anual'));
        headRow.appendChild(thAnual);
        thead.appendChild(headRow);
        table.appendChild(thead);

        // Cuerpo
        var tbody = createElement('tbody');
        for (var i = 0; i < keys.length; i++) {
            var key = keys[i];
            var label = LABELS[key] || key;
            var values = data.map(function(d) { 
                var val = (d.values && d.values[key] != null) ? d.values[key] : '';
                // Convertir a Fahrenheit si es temperatura
                if (useFahrenheit && esTemperatura(key) && val !== '') {
                    val = celsiusAFahrenheit(val);
                }
                return val;
            });

            var tr = createElement('tr');
            var tdLabel = createElement('td', {
                style: 'border: 1px solid #ddd; padding: 6px 8px; text-align: left; font-weight: 600;'
            });
            tdLabel.appendChild(document.createTextNode(label));
            tr.appendChild(tdLabel);

            for (var j = 0; j < months.length; j++) {
                var td = createElement('td', {
                    style: 'border: 1px solid #ddd; padding: 6px 8px; text-align: right;'
                });
                var text = (values[j] !== undefined && values[j] !== null) ? values[j] : '';
                td.appendChild(document.createTextNode(text));
                tr.appendChild(td);
            }

            var tdAnnual = createElement('td', {
                style: 'border: 1px solid #ddd; padding: 6px 8px; text-align: right; font-weight: 700;'
            });
            tdAnnual.appendChild(document.createTextNode(average(values)));
            tr.appendChild(tdAnnual);

            tbody.appendChild(tr);
        }

        table.appendChild(tbody);
        container.appendChild(table);
    }

    // ========== WEB COMPONENT ==========

    class DatosMeteorologicos extends HTMLElement {
        constructor() {
            super();
            
            // Estado inicial
            this._useFahrenheit = false;
            
            // Crear elementos usando funciones externas
            this._toggleBtn = crearBotonToggle();
            this._container = crearContenedorTabla();

            // Datos hardcodeados
            this._data = [
                { "month": "Ene", "values": { "temp_max_abs": 42.4, "temp_max_avg": 26.3, "temp_avg": 20.3, "temp_min_avg": 14.3, "precip_mm": 100.1, "sun_hours": 288.3, "humidity": 76 } },
                { "month": "Feb", "values": { "temp_max_abs": 38.1, "temp_max_avg": 25.8, "temp_avg": 19.9, "temp_min_avg": 14.1, "precip_mm": 72.8, "sun_hours": 234.5, "humidity": 77 } },
                { "month": "Mar", "values": { "temp_max_abs": 36.3, "temp_max_avg": 23.7, "temp_avg": 18.0, "temp_min_avg": 12.5, "precip_mm": 107.0, "sun_hours": 232.5, "humidity": 79 } },
                { "month": "Abr", "values": { "temp_max_abs": 32.5, "temp_max_avg": 20.5, "temp_avg": 14.6, "temp_min_avg": 9.1, "precip_mm": 73.3, "sun_hours": 195.0, "humidity": 81 } },
                { "month": "May", "values": { "temp_max_abs": 27.4, "temp_max_avg": 18.4, "temp_avg": 11.3, "temp_min_avg": 6.4, "precip_mm": 73.5, "sun_hours": 167.4, "humidity": 83 } },
                { "month": "Jun", "values": { "temp_max_abs": 22.2, "temp_max_avg": 13.1, "temp_avg": 8.5, "temp_min_avg": 4.1, "precip_mm": 54.9, "sun_hours": 120.0, "humidity": 83 } },
                { "month": "Jul", "values": { "temp_max_abs": 27.7, "temp_max_avg": 14.4, "temp_avg": 8.1, "temp_min_avg": 3.8, "precip_mm": 58.9, "sun_hours": 127.1, "humidity": 83 } },
                { "month": "Ago", "values": { "temp_max_abs": 27.8, "temp_max_avg": 14.0, "temp_avg": 8.9, "temp_min_avg": 4.0, "precip_mm": 60.4, "sun_hours": 164.3, "humidity": 80 } },
                { "month": "Sep", "values": { "temp_max_abs": 28.4, "temp_max_avg": 15.2, "temp_avg": 10.3, "temp_min_avg": 5.3, "precip_mm": 83.4, "sun_hours": 174.0, "humidity": 77 } },
                { "month": "Oct", "values": { "temp_max_abs": 34.4, "temp_max_avg": 19.1, "temp_avg": 13.1, "temp_min_avg": 7.6, "precip_mm": 75.3, "sun_hours": 210.8, "humidity": 77 } },
                { "month": "Nov", "values": { "temp_max_abs": 35.7, "temp_max_avg": 21.7, "temp_avg": 15.9, "temp_min_avg": 10.1, "precip_mm": 104.0, "sun_hours": 222.0, "humidity": 78 } },
                { "month": "Dic", "values": { "temp_max_abs": 39.4, "temp_max_avg": 24.4, "temp_avg": 18.5, "temp_min_avg": 12.7, "precip_mm": 92.3, "sun_hours": 269.7, "humidity": 80 } }
            ];

            // Bindeo del handler
            this._onToggleClick = this.toggleUnit.bind(this);
        }

        toggleUnit() {
            this._useFahrenheit = !this._useFahrenheit;
            this.render();
        }

        actualizarTextoBoton() {
            const unit = this._useFahrenheit ? '°F' : '°C';
            const nextUnit = this._useFahrenheit ? '°C' : '°F';
            this._toggleBtn.textContent = `Mostrar temperaturas en ${nextUnit}`;
        }

        connectedCallback() {
            this.appendChild(this._toggleBtn);
            this.appendChild(this._container);
            this._toggleBtn.addEventListener('click', this._onToggleClick);
            this.render();
        }

        disconnectedCallback() {
            this._toggleBtn.removeEventListener('click', this._onToggleClick);
        }

        render() {
            this.actualizarTextoBoton();
            renderTable(this._container, this._data, this._useFahrenheit);
        }
    }

    customElements.define('datos-meteorologicos', DatosMeteorologicos);

    function main() {
        var elem = createElement('datos-meteorologicos');
        document.body.appendChild(elem);
    }

    window.onload = main;
  </script>
</head>
<body>
</body>
</html>
