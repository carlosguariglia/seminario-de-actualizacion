<script>

class Slider extends HTMLElement
{
    constructor(labelText, initialValue)
    {   super();
        this._value = initialValue;

        this.label = document.createElement('label');
        this.input = document.createElement('input');
        this.span = document.createElement('span');

        this.input.type = 'range';
        this.input.min = -12;
        this.input.max = 12;
        this.input.value = initialValue;

        this.span.textContent = initialValue + ' dB';

        this.label.textContent = labelText;
    
        this._bloque = document.createElement('div');
        this._bloque.appendChild(this.label);
        this._bloque.appendChild(this.input);
        this._bloque.appendChild(this.span);
    
    }

    // contenedor para insertar en el DOM de una sola vez
    get bloque() { return this._bloque; }

    // valor público
    get value() { return this._value; }

    set value(valor) {
        this._value = valor;
        this.input.value = this._value;
        this.span.textContent = this._value + ' dB';
    }

    connectedCallback() {}

    disconnectedCallback(){}

    
} // fin clase Slider

customElements.define('x-slider', Slider);


class Equalizer extends HTMLElement
{
    constructor()
    {   
        // Llamar al constructor de la clase padre (HTMLElement)
        super();

        // mantengo los datos aca, mientras que en el arreglo mantengo los bloques de los sliders
        this._data = {};

        this._data['32 Hz'] = 0;
        this._data['64 Hz'] = 0;
    
        


        // estructura de datos que representaran las frecuencias y sus valores.
        // array of sliders
        
        this.slidersArr = [];
        

        // Crear el título de la calculadora (aca se crea el titulo que estaba en H1)
        this.uptitle = document.createElement('h1');
        this.uptitle.innerText = 'Graphic EQ';


        // Crear los elementos del EQ

        this.display = document.createElement('input');
        this.btnGuardar = document.createElement('button');
        this.btnX = document.createElement('button');
        this.btnOk = document.createElement('button');
        this.btnCancel = document.createElement('button');
        this.btnAudition = document.createElement('button');
        this.btnHelp = document.createElement('button');

        // sliders: crear instancias reutilizables de la clase Slider
        this.sld32hz = new Slider('32 Hz', 0);
        this.slidersArr.push(this.sld32hz);
        // agrego a this_data las frecuencias y sus valores iniciales
       

        this.sld64hz = new Slider('64 Hz', 0);
        this.slidersArr.push(this.sld64hz);
        


        // armado de la tabla que servira de estructura del EQ
        this.table = document.createElement('table');

        let row0 = this.table.insertRow();
        let col0 = row0.insertCell();
        //col0.colSpan = 4;
        col0.appendChild(this.display);    

        let row1 = this.table.insertRow();
        let col01 = row1.insertCell();
        col01.appendChild(this.sld32hz.bloque);
        let row02 = this.table.insertRow();
        let col02 = row02.insertCell();
        col02.appendChild(this.sld64hz.bloque);



        let col21 = row1.insertCell();
        col21.appendChild(this.btnOk);
        let col22 = row1.insertCell();
        col22.appendChild(this.btnCancel);
        let col23 = row1.insertCell();
        col23.appendChild(this.btnAudition);
        let col24 = row1.insertCell();
        col24.appendChild(this.btnHelp);
        
        // Preparacion de las instancias
        
        this.display.type = 'text';
        this.display.readOnly = true;
        this.display.style.textAlign = 'right';
        this.display.value = '';
        
        this.btnGuardar.innerText = 'Guardar';
        this.btnX.innerText = 'X';
        this.btnOk.innerText = 'OK';
        this.btnCancel.innerText = 'Cancel';
        this.btnAudition.innerText = 'Audition';
        this.btnHelp.innerText = 'Help';
        

        this.appendChild(this.uptitle);
        this.appendChild(this.table);
    }

// metodo GETDATA y SETDATA

    getData() {
        return this._data;
    }
    
    setData(newData) {
    
    }

    onsSliderChange(event)  // recorro this_data y emparejo cada uno a los valores de los sliders
    {   
        event.target.value = event.target.input.value;

        console.log(this.sld32hz.value, this.sld64hz.value);


        for (let key in this._data) {
            if (key === '32 Hz') {
                this._data[key] = this.sld32hz.value;
            } else if (key === '64 Hz') {
                this._data[key] = this.sld64hz.value;
            }
        }
        console.log('Data :', this._data);
    }



    onAuditionClick() {
        let config = this.getData();
        console.log('Auditioning with config:', config);}   
        
    
    connectedCallback()
    {
        // se movio aca el appendchild porque daba error al hacerlo en la clase
        
        this.sld32hz.input.oninput = this.onsSliderChange.bind(this);
        this.sld64hz.input.oninput = this.onsSliderChange.bind(this);
        this.btnAudition.onclick = this.onAuditionClick.bind(this);
    }

    disconnectedCallback()
    {
        this.btnAudition.onclick = null;
    }
}  // fin clase Equalizer

customElements.define('x-equalizer', Equalizer);


function main()
{
    // crear el custom element via DOM (no usar `new Equalizer()` directamente)
    let myCustomEqualizer = new Equalizer();
    document.body.appendChild(myCustomEqualizer);
    
}

window.onload = main;

</script>
