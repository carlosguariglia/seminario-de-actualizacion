<script>

class Slider {
    constructor(labelText, initialValue) {
        
        this.label = document.createElement('label');
        this.label.textContent = labelText;

        this.input = document.createElement('input');
        this.input.type = 'range';
        this.input.min = -12;
        this.input.max = 12;
        this.input.value = initialValue;

        this.span = document.createElement('span');
        this.span.textContent = initialValue + ' dB';

        this.input.oninput = () => {
        this._value = this.input.value;
        this.span.textContent = this.input.value + ' dB';

        this.bloque = document.createElement('div');
        this.bloque.append(this.label, this.input, this.span);
        };
    }

    get value() {
        return this._value;
    }

    set value(newValue) {
        this._value = newValue;
        this.input.value = newValue;
        this.span.textContent = newValue + ' dB';
    }
}
