<!-- Ejercicio 2: Construya un programa que solicite al usuario su fecha de nacimiento
y que luego valide si la cadena de texto ingresada es realmente una fecha. 
En caso de que no, deberá mostrar un mensaje de error notificando que el texto 
suministrado es inválido y que vuelva a pedir la fecha hasta que sea válida.
Cada error deberá incluir el número de reintentos. 
-->

<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seminario Ejercicio 2</title>
    <style>
        table, tr, td {
            margin: auto;
            border: 1px solid white;
            border-collapse: collapse;

        }
        /* Centrar el título */
        h1 { text-align: center; } 
        
    </style>
</head>

<body>
</body> 

<script>

function esFormatoValido(fecha) {    
        // chequea que el formato sea 2 numeros / 2 numeros / 4 numeros
        if (!/^\d{2}\/\d{2}\/\d{4}$/.test(fecha)) return false;
        
        // usando el consrtructor DATE se chequea que sea una fecha valida
        let prueba = new Date(fecha);
        if (prueba.toDateString() === 'Invalid Date') return false;
        
        // se crea una fecha de hoy y se compara con la fecha ingresada para evitar fechas futuras
        
        let hoy = Date.now();
        

        if (prueba > hoy) return false; // no puede ser una fecha futura
        return true;
}


class ValidadorFecha extends HTMLElement
{
    constructor()
    {   
        // Llamar al constructor de la clase padre (HTMLElement)
        super();

        // Crear el título del programa (aca se crea el titulo que estaba en H1)
        this.uptitle = document.createElement('h1');
        this.uptitle.innerText = 'Validador de Fecha de Nacimiento';


        // Crear los elementos del validador
        this.displayfecha = document.createElement('input');
        this.btnvalidar = document.createElement('button');
        this.labelcantidadintentos = document.createElement('label');
        this.displayintentos = document.createElement('input');
        

        // Preparacion de las instancias
        this.displayfecha.type = 'text';
        this.btnvalidar.innerText = 'Validar Fecha';
        this.displayintentos.type = 'text';
        this.displayintentos.readOnly = true;
        this.displayintentos.value = 0;
        this.labelcantidadintentos.innerText = 'Cantidad de Intentos: ';
        this.displayfecha.placeholder = 'DD/MM/YYYY';

        // Agregar los elementos al DOM  (DOM = arbol de objetos)
        
        this.appendChild(this.uptitle);
        this.appendChild(this.displayfecha);
        this.appendChild(this.btnvalidar);
        this.appendChild(this.labelcantidadintentos);
        this.appendChild(this.displayintentos);
    }

    

    onbtnvalidarClick() {
        let fecha = this.displayfecha.value;
        let intentos = parseInt(this.displayintentos.value, 10) || 0;

        if (!esFormatoValido(fecha))
        {
            intentos++;
            this.displayintentos.value = intentos;
            alert(`Fecha inválida.\nVuelva a ingresar una fecha Valida.\nDebe ser en el formato DD/MM/YYYY\nNo debe ser una fecha futura\nIntento ${intentos}.`);
        } else {
            alert('Fecha válida: ' + fecha);
            this.displayintentos.value = 0;
        }
    }

  

    connectedCallback()
    {
        this.btnvalidar.onclick = this.onbtnvalidarClick.bind(this);
    }

    disconnectedCallback()
    {
        this.btnvalidar.onclick = null;
    }
}


customElements.define('x-validadorfecha', ValidadorFecha);




function main()
{
    let myCustomValidadorFecha = new ValidadorFecha();
    document.body.appendChild(myCustomValidadorFecha);

}

window.onload = main;

</script>

</html>
