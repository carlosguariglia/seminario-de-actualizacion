<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    <style>
        input[type="button"] {
            width: 100%;
        }
        
        .boton-borrar { background: #ef4444; color: white; }
        .boton-azul { background: #3b82f6; color: white; }
        .boton-verde { background: #10b981; color: white; }
        .boton-naranja { background: #f59e0b; color: white; }
    </style>

    <script>
        <!-- JavaScript para manejar la lógica de la calculadora by Github Copilot -->

        document.addEventListener('DOMContentLoaded', function() {
            const display = document.getElementById('display');
            const buttons = document.querySelectorAll('input[type="button"]');
            let currentInput = '';

            buttons.forEach(button => {
                button.addEventListener('click', function() {
                    const value = this.value;

                    if (value === 'Borrar') {
                        currentInput = '';
                        display.value = '';
                    } else if (value === '=') {
                        try {
                            currentInput = eval(currentInput).toString();
                            display.value = currentInput;
                        } catch (e) {
                            display.value = 'Error';
                            currentInput = '';
                        }
                    } else {
                        currentInput += value;
                        display.value = currentInput;
                    }
                });
            });
        });
    </script>


</head>
<body>
    <h1>Calculadora</h1>
    <table>
        <tr>
            <td colspan="4"><input type="text" id="display" readonly></td>
        </tr>
        <tr>
            <td><input type="button" value="7" class="boton-azul"></td>
            <td><input type="button" value="8" class="boton-azul"></td>
            <td><input type="button" value="9" class="boton-azul"></td>
            <td><input type="button" value="+" class="boton-verde"></td>
        </tr>
        <tr>
            <td><input type="button" value="4" class="boton-azul"></td>
            <td><input type="button" value="5" class="boton-azul"></td>
            <td><input type="button" value="6" class="boton-azul"></td>
            <td><input type="button" value="-" class="boton-verde"></td>
        </tr>
        <tr>
            <td><input type="button" value="3" class="boton-azul"></td>
            <td><input type="button" value="2" class="boton-azul"></td>
            <td><input type="button" value="1" class="boton-azul"></td>
            <td><input type="button" value="*" class="boton-verde"></td>
        </tr>
        <tr>
            <td><input type="button" value="0" class="boton-azul"></td>
            <td><input type="button" value="." class="boton-azul"></td>
            <td><input type="button" value="=" class="boton-naranja"></td>
            <td><input type="button" value="/" class="boton-verde"></td>
        </tr>
        <tr>
            <td colspan="4"><input type="button" value="Borrar" class="boton-borrar"></td>
        </tr>
    </table>
