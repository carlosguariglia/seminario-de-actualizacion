<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="utf-8" />
	<title>Calculadora</title>
</head>

<style>

table, tr, td
{
	border: 1px solid white;
	border-collapse: collapse;
}

.btnDelete
{
	color: white;
	font-family: arial;
	font-weight: bold;
	font-size: 70%;
	background-color: red;
	box-shadow: 0px 5px #BB3E22;

	width: 100%;
	height 30px;

	border-radius: 6px;
	border-color: #BB3E22;
}

</style>

<body>

	<table>
		<tr>
			<td colspan="4">
				<input id="display" type="text" value="" disabled></input>
			</td>
		</tr>

		<tr>
			<td>
				<button id="btn7">7</button>
			</td>
			<td>
				<button id="btn8">8</button>
			</td>
			<td>
				<button id="btn9">9</button>
			</td>
			<td>
				<button id="btnPlus">+</button>
			</td>
		</tr>

		<tr>
			<td>
				<button id="btn4">4</button>
			</td>
			<td>
				<button id="btn5">5</button>
			</td>
			<td>
				<button id="btn6">6</button>
			</td>
			<td>
				<button id="btnMinus">-</button>
			</td>
		</tr>

		<tr>
			<td>
				<button id="btn3">3</button>
			</td>
			<td>
				<button id="btn2">2</button>
			</td>
			<td>
				<button id="btn1">1</button>
			</td>
			<td>
				<button id="btnMultiply">*</button>
			</td>
		</tr>

		<tr>
			<td>
				<button id="btn0">0</button>
			</td>
			<td>
				<button id="btnDot">.</button>
			</td>
			<td>
				<button id="btnResult">=</button>
			</td>
			<td>
				<button id="btnDivision">/</button>
			</td>
		</tr>

		<tr>
			<td colspan="4">
				<button id="btnDelete" class="btnDelete">Borrar</button>
			</td>
		</tr>
	</table>

</body>

<script type="text/javascript">


function onBtn0Click()
{
	display.value += '0';
}

function onBtn1Click()
{
	display.value += '1';
}

function onBtn2Click()
{
	display.value += '2';
}

function onBtn3Click()
{
	display.value += '3';
}

function onBtn4Click()
{
	display.value += '4';
}

function onBtn5Click()
{
	display.value += '5';
}

function onBtn6Click()
{
	display.value += '6';
}

function onBtn7Click()
{
	display.value += '7';
}

function onBtn8Click()
{
	display.value += '8';
}

function onBtn9Click()
{
	display.value += '9';
}

function onBtnDotClick()
{
	display.value += '.';
}

function onBtnPlusClick()
{
	display.value += '+';
}

function onBtnMinusClick()
{
	display.value += '-';
}

function onBtnMultiplyClick()
{
	display.value += '*';
}

function onBtnDivisionClick()
{
	display.value += '/';
}

function onBtnResultClick()
{
	display.value = eval( display.value );
}

function onBtnDeleteClick()
{
	display.value = '';
}

function main()
{
	//Botones numéricos
	btn0.onclick = onBtn0Click;
	btn1.onclick = onBtn1Click;
	btn2.onclick = onBtn2Click;
	btn3.onclick = onBtn3Click;
	btn4.onclick = onBtn4Click;
	btn5.onclick = onBtn5Click;
	btn6.onclick = onBtn6Click;
	btn7.onclick = onBtn7Click;
	btn8.onclick = onBtn8Click;
	btn9.onclick = onBtn9Click;

	//Botones de operación
	btnDot.onclick = onBtnDotClick;
	btnPlus.onclick = onBtnPlusClick;
	btnMinus.onclick = onBtnMinusClick;
	btnMultiply.onclick = onBtnMultiplyClick;
	btnDivision.onclick = onBtnDivisionClick;
	btnDelete.onclick = onBtnDeleteClick;

	//Resultado
	btnResult.onclick = onBtnResultClick;
}

window.onload = main;

</script>

</html>
